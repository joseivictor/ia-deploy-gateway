<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard IA</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
background:#0f172a;
font-family:Arial;
color:white;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:20px;
}

.value{
font-size:32px;
font-weight:bold;
margin-top:10px;
}

.green{color:#22c55e;}
.red{color:#fb7185;}
.blue{color:#60a5fa;}

.panel{
background:#1e293b;
padding:25px;
border-radius:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>💰 Dashboard Financeiro IA</h1>

<div class="cards">

<div class="card">
Receita
<div class="value green">R$ 12.500</div>
</div>

<div class="card">
Gastos
<div class="value red">R$ 4.200</div>
</div>

<div class="card">
Lucro
<div class="value blue">R$ 8.300</div>
</div>

</div>

<div class="panel">
<canvas id="grafico"></canvas>
</div>

</div>

<script>
new Chart(document.getElementById('grafico'),{
type:'bar',
data:{
labels:['Jan','Fev','Mar','Abr','Mai','Jun'],
datasets:[
{
label:'Receita',
data:[3000,5000,4200,7000,9200,12500]
},
{
label:'Gastos',
data:[1200,1800,2400,2800,3300,4200]
}
]
}
});
</script>

</body>
</html>
